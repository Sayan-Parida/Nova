

spring.application.name=nova-backend

server.port=${SERVER_PORT:8081}
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nova}?options=-c%20TimeZone%3DUTC
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:nova}
spring.datasource.password=${DB_PASSWORD:nova_pass}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.pool-name=NovaHikariPool

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

app.jwt.secret=${JWT_SECRET:test-secret-that-is-at-least-32-characters-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.auth.refresh-cookie-secure=${AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie-samesite=${AUTH_REFRESH_COOKIE_SAMESITE:Lax}