version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: nova-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nova}
      MYSQL_USER: ${DB_USERNAME:-nova}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nova_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nova-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-nova}
      DB_USERNAME: ${DB_USERNAME:-nova}
      DB_PASSWORD: ${DB_PASSWORD:-nova_pass}
      JWT_SECRET: ${JWT_SECRET:-replace-with-at-least-32-char-secret}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
